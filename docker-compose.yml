services:
  app:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cleaning_log
      HOUSEHOLD_CONFIG_PATH: /app/data/gumabyt.json
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run db:init && npm run db:seed && npm run dev"

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cleaning_log
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cleaning_log"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  postgres_data:
